<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PA-STAIR Framework</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #f0ede6;
  color: #1a1a1a;
  min-height: 100vh;
}

header {
  padding: 2rem 3rem 1.25rem;
  background: #f0ede6;
}

header h2 {
  font-size: 24px;
  font-weight: 900;
  color: #2a3a0a;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

header .underline {
  width: 160px;
  height: 3px;
  background: #c0392b;
  margin-top: 8px;
  border-radius: 2px;
}

/* ── MAIN LAYOUT ── */
main {
  display: flex;
  align-items: flex-start;
  padding: 1rem 2rem 3rem;
  gap: 1.5rem;
}

/* Left column: legend */
.col-legend {
  flex: 0 0 180px;
  padding-top: 1.5rem;
}

.legend-heading {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 1.2rem;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.3rem;
}

.legend-petal {
  width: 32px;
  height: 50px;
  flex-shrink: 0;
}

.legend-label {
  font-size: 13px;
  color: #444;
  font-weight: 500;
  line-height: 1.3;
}

/* Center: canvas */
.col-canvas {
  flex: 0 0 620px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#c {
  width: 620px;
  height: 620px;
  cursor: pointer;
  display: block;
}

#hint {
  font-size: 13px;
  color: #aaa;
  text-align: center;
  margin-top: 6px;
  min-height: 20px;
  font-style: italic;
}

/* Right column: info panel area */
.col-right {
  flex: 1;
  min-width: 0;
  padding-top: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* ── PANELS ── */
.panel-placeholder {
  background: #e8e5de;
  border-radius: 14px;
  padding: 2rem;
  text-align: center;
  color: #bbb;
  font-size: 14px;
  font-style: italic;
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.panel-box {
  background: #fff;
  border: 1px solid #e0ddd6;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 14px rgba(0,0,0,0.06);
  display: none;
}

.panel-box.visible { display: block; }

/* Info panel (left) */
.info-panel .panel-top {
  padding: 1.1rem 1.3rem 0.4rem;
}

.stage-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 0.8rem;
  flex-wrap: wrap;
}

.stage-tab {
  font-size: 12px;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid #ddd;
  cursor: pointer;
  color: #777;
  background: transparent;
  font-family: inherit;
  transition: all 0.15s;
}
.stage-tab:hover { background: #f5f5f5; }
.stage-tab.active { color: #fff; border-color: transparent; font-weight: 600; }

.panel-header {
  display: flex;
  align-items: center;
  gap: 9px;
}

.panel-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

.panel-title {
  font-size: 17px;
  font-weight: 700;
  color: #1a1a1a;
}

.panel-stage-lbl {
  font-size: 11px;
  color: #bbb;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0.3rem 1.3rem 0;
}

.edit-wrap {
  padding: 0.5rem 1.3rem 0.7rem;
}

.edit-lbl {
  font-size: 10px;
  color: #ccc;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}

textarea {
  width: 100%;
  min-height: 90px;
  background: #fafaf8;
  border: 1px solid #e8e5df;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  color: #333;
  font-family: inherit;
  line-height: 1.7;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
}
textarea:focus { border-color: #aaa; background: #fff; }

.panel-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.3rem 1.1rem;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  font-size: 12px;
  padding: 6px 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  cursor: pointer;
  background: transparent;
  color: #333;
  font-family: inherit;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { background: #f0f0f0; }

.btn-pin {
  border-color: #2d7ab5;
  color: #2d7ab5;
  font-weight: 600;
}
.btn-pin:hover { background: #eef5fc; }
.btn-pin.pinned {
  background: #2d7ab5;
  color: #fff;
}
.btn-pin.pinned:hover { background: #1f5f8a; }

.save-confirm {
  font-size: 12px;
  color: #2e7d32;
  opacity: 0;
  transition: opacity 0.3s;
}
.save-confirm.show { opacity: 1; }

/* Notes panel */
.notes-panel .notes-header {
  padding: 1rem 1.3rem 0.4rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #f0ede6;
}
.notes-title {
  font-size: 14px;
  font-weight: 700;
  color: #555;
}
.notes-context {
  font-size: 11px;
  color: #bbb;
  font-style: italic;
}
.notes-wrap { padding: 0.6rem 1.3rem 1rem; }
.notes-wrap textarea { min-height: 80px; }
.notes-footer {
  padding: 0 1.3rem 1rem;
  display: flex;
  justify-content: flex-end;
}

/* Pin indicator strip */
.pin-strip {
  display: none;
  background: #2d7ab5;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 5px 1.3rem;
  align-items: center;
  gap: 8px;
}
.pin-strip.visible { display: flex; }
.pin-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  opacity: 0.8;
}
</style>
</head>
<body>

<header>
  <h2>Framework — Public Sector Institution</h2>
  <div class="underline"></div>
</header>

<main>

  <!-- LEGEND -->
  <div class="col-legend">
    <div class="legend-heading">Phases</div>
    <div class="legend-item">
      <svg class="legend-petal" viewBox="0 0 32 50">
        <path d="M3,46 L7,8 Q16,-1 25,8 L29,46 Q16,52 3,46Z" fill="#2c4a6e"/>
      </svg>
      <div class="legend-label">Adaptation<br>phase</div>
    </div>
    <div class="legend-item">
      <svg class="legend-petal" viewBox="0 0 32 50">
        <path d="M3,46 L7,8 Q16,-1 25,8 L29,46 Q16,52 3,46Z" fill="#2d7ab5"/>
      </svg>
      <div class="legend-label">Analysis<br>phase</div>
    </div>
    <div class="legend-item">
      <svg class="legend-petal" viewBox="0 0 32 50">
        <path d="M3,46 L7,8 Q16,-1 25,8 L29,46 Q16,52 3,46Z" fill="#8ecae6"/>
      </svg>
      <div class="legend-label">Exploration<br>phase</div>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="col-canvas">
    <canvas id="c" width="620" height="620"></canvas>
    <div id="hint">Click any stage in a flower to explore its content</div>
  </div>

  <!-- RIGHT PANELS -->
  <div class="col-right">

    <!-- INFO PANEL -->
    <div class="panel-placeholder" id="placeholder-info">
      Click a petal stage to see its information here
    </div>

    <div class="panel-box info-panel" id="info-panel">
      <div class="pin-strip" id="pin-strip">
        <div class="pin-dot"></div>
        <span id="pin-strip-text">Phase pinned</span>
      </div>
      <div class="panel-top">
        <div class="stage-tabs" id="stage-tabs"></div>
        <div class="panel-header">
          <div class="panel-dot" id="panel-dot"></div>
          <div class="panel-title" id="panel-title"></div>
        </div>
      </div>
      <div class="panel-stage-lbl" id="panel-stage-lbl"></div>
      <div class="edit-wrap">
        <div class="edit-lbl">Content — click to edit</div>
        <textarea id="info-textarea" placeholder="Describe this phase…"></textarea>
      </div>
      <div class="panel-footer">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <button class="btn btn-pin" id="pin-btn">Choose this phase</button>
          <button class="btn" id="save-btn">Save</button>
        </div>
        <span class="save-confirm" id="save-confirm">Saved!</span>
      </div>
    </div>

    <!-- NOTES PANEL -->
    <div class="panel-box notes-panel visible" id="notes-panel" style="display:block;">
      <div class="notes-header">
        <div class="notes-title">My notes</div>
        <div class="notes-context" id="notes-context">No phase selected</div>
      </div>
      <div class="notes-wrap">
        <textarea id="notes-textarea" placeholder="Write your own notes here…"></textarea>
      </div>
      <div class="notes-footer">
        <button class="btn" id="notes-save-btn">Save note</button>
        <span class="save-confirm" id="notes-confirm" style="margin-left:10px;">Saved!</span>
      </div>
    </div>

  </div>
</main>

<script>
const TAU=Math.PI*2, PI=Math.PI;
const CX=310, CY=310;
const CORE_R=54;
const PINK_R=116;

const SC=['#8ecae6','#2d7ab5','#2c4a6e'];
const SN=['Exploration phase','Analysis phase','Adaptation phase'];

const FLOWERS=[
  {id:'third_party', label:'Third party\nvendor',        angle:-90},
  {id:'governance',  label:'Governance',                 angle:-38},
  {id:'reflection',  label:'Reflection\n(Holm)',         angle: 14},
  {id:'sensemaking', label:'Sensemaking',                angle: 62},
  {id:'competence',  label:'Competence\nalignment',      angle:114},
  {id:'trust',       label:'Trust &\ntransparency',      angle:166},
  {id:'org_embed',   label:'Organisational\nembedding',  angle:218},
];

const INNER=[
  {label:'Technology',   color:'#b56fcc', start:-PI*0.44, end: PI*0.50},
  {label:'Organisation', color:'#de7db8', start: PI*0.50, end: PI*1.38},
  {label:'Human',        color:'#c85aaa', start: PI*1.38, end: PI*2.56},
];

const BR=PINK_R+2;
const BASE=[
  {ri:BR,      ro:BR+54,  sp:0.60},
  {ri:BR+56,   ro:BR+100, sp:0.52},
  {ri:BR+102,  ro:BR+138, sp:0.44},
];

const phaseContent={};
const phaseNotes={};
FLOWERS.forEach(f=>{
  phaseContent[f.id]=[
    'Describe the Exploration phase for '+f.label.replace('\n',' ')+' here.',
    'Describe the Analysis phase for '+f.label.replace('\n',' ')+' here.',
    'Describe the Adaptation phase for '+f.label.replace('\n',' ')+' here.',
  ];
  phaseNotes[f.id]=['','',''];
});

const state={flower:null, step:null};
const pinned={flower:null, step:null};
const hits=[];

function toR(d){return d*PI/180;}

function getRings(isAct, actStep){
  if(!isAct) return BASE;
  return BASE.map((r,i)=>{
    if(i===actStep) return {ri:r.ri-(i===0?8:0), ro:r.ro+(i===0?58:i===1?50:42), sp:r.sp+0.20};
    return {ri:r.ri, ro:r.ro, sp:r.sp*0.72};
  });
}

function drawPetal(ctx,angle,ri,ro,sp,color,alpha){
  const h=sp/2, a1=angle-h, a2=angle+h;
  ctx.beginPath();
  ctx.arc(CX,CY,ri,a1,a2);
  const o1x=CX+ro*Math.cos(a2), o1y=CY+ro*Math.sin(a2);
  const o2x=CX+ro*Math.cos(a1), o2y=CY+ro*Math.sin(a1);
  const capX=CX+(ro+22)*Math.cos(angle), capY=CY+(ro+22)*Math.sin(angle);
  ctx.lineTo(o1x,o1y);
  ctx.quadraticCurveTo(capX,capY,o2x,o2y);
  ctx.closePath();
  ctx.fillStyle=color;
  ctx.globalAlpha=alpha;
  ctx.fill();
  ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(255,255,255,0.55)';
  ctx.lineWidth=1.5;
  ctx.stroke();
}

function inPetal(px,py,angle,ri,ro,sp){
  const dx=px-CX, dy=py-CY, d=Math.sqrt(dx*dx+dy*dy);
  if(d<ri-6||d>ro+26) return false;
  let a=Math.atan2(dy,dx)-angle;
  while(a>PI) a-=TAU; while(a<-PI) a+=TAU;
  return Math.abs(a)<sp/2+0.07;
}

function rotText(ctx,text,x,y,angle,size,weight,color){
  ctx.save();
  ctx.translate(x,y);
  let rot=angle+PI/2;
  if(Math.cos(rot+PI/2)<0) rot+=PI;
  ctx.rotate(rot);
  ctx.font=`${weight} ${size}px 'Segoe UI',system-ui,sans-serif`;
  ctx.fillStyle=color;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  const lines=text.split('\n');
  const lh=size*1.35, oy=-(lines.length-1)*lh/2;
  lines.forEach((l,i)=>ctx.fillText(l,0,oy+i*lh));
  ctx.restore();
}

function draw(){
  const canvas=document.getElementById('c');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,620,620);
  hits.length=0;

  FLOWERS.forEach(f=>{
    const angle=toR(f.angle);
    const isAct=state.flower===f.id;
    const isPinned=pinned.flower===f.id;
    const rings=getRings(isAct||(isPinned&&!isAct), isAct?state.step:pinned.step);
    const maxRo=Math.max(...rings.map(r=>r.ro));
    const blobD=maxRo+28;
    const bx=CX+blobD*Math.cos(angle), by=CY+blobD*Math.sin(angle);

    // Olive blob
    ctx.save();
    ctx.translate(bx,by);
    ctx.rotate(angle+PI/2);
    ctx.beginPath();
    ctx.ellipse(0,0,44,26,0,0,TAU);
    ctx.fillStyle='#b8b87a';
    ctx.globalAlpha=0.85;
    ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();

    // Draw rings outermost first
    for(let si=rings.length-1;si>=0;si--){
      const r=rings[si];
      const isStAct=(isAct&&state.step===si)||(isPinned&&!isAct&&pinned.step===si);
      const alpha=isStAct?1:(isAct||isPinned)?0.68:0.92;
      drawPetal(ctx,angle,r.ri,r.ro,r.sp,SC[si],alpha);
      hits.push({flower:f.id,step:si,angle,ri:r.ri,ro:r.ro,sp:r.sp});
    }

    // Pinned ring glow outline
    if(isPinned&&!isAct){
      const pr=getRings(true,pinned.step)[pinned.step];
      ctx.save();
      const h=pr.sp/2, a1=angle-h, a2=angle+h;
      ctx.beginPath();
      ctx.arc(CX,CY,pr.ri,a1,a2);
      const o1x=CX+pr.ro*Math.cos(a2), o1y=CY+pr.ro*Math.sin(a2);
      const o2x=CX+pr.ro*Math.cos(a1), o2y=CY+pr.ro*Math.sin(a1);
      const capX=CX+(pr.ro+22)*Math.cos(angle), capY=CY+(pr.ro+22)*Math.sin(angle);
      ctx.lineTo(o1x,o1y);
      ctx.quadraticCurveTo(capX,capY,o2x,o2y);
      ctx.closePath();
      ctx.strokeStyle=SC[pinned.step];
      ctx.lineWidth=3;
      ctx.globalAlpha=0.5;
      ctx.stroke();
      ctx.globalAlpha=1;
      ctx.restore();
    }

    rotText(ctx,f.label,bx,by,angle,10,'600','#363620');
  });

  // Pink outer ring
  ctx.beginPath();
  ctx.arc(CX,CY,PINK_R,0,TAU);
  ctx.fillStyle='#f2a0d0';
  ctx.fill();

  // Inner segments
  INNER.forEach(seg=>{
    ctx.beginPath();
    ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,PINK_R-8,seg.start,seg.end);
    ctx.closePath();
    ctx.fillStyle=seg.color;
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.7)';
    ctx.lineWidth=1.5;
    ctx.stroke();
    const mid=(seg.start+seg.end)/2;
    const td=(PINK_R-8)*0.63;
    rotText(ctx,seg.label,CX+td*Math.cos(mid),CY+td*Math.sin(mid),mid-PI/2,11,'600','#fff');
  });

  // Core circle
  ctx.beginPath();
  ctx.arc(CX,CY,CORE_R,0,TAU);
  ctx.fillStyle='#5a1870';
  ctx.fill();
  ctx.font="700 12px 'Segoe UI',system-ui,sans-serif";
  ctx.fillStyle='#fff';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('PA-STAIR',CX,CY-7);
  ctx.font="400 10px 'Segoe UI',system-ui,sans-serif";
  ctx.fillText('Framework',CX,CY+8);
}

// ── CLICK HANDLER ──
document.getElementById('c').addEventListener('click',function(e){
  const rect=this.getBoundingClientRect();
  const sx=620/rect.width, sy=620/rect.height;
  const px=(e.clientX-rect.left)*sx, py=(e.clientY-rect.top)*sy;
  let hit=null;
  for(let i=hits.length-1;i>=0;i--){
    const h=hits[i];
    if(inPetal(px,py,h.angle,h.ri,h.ro,h.sp)){hit=h;break;}
  }
  if(!hit||(state.flower===hit.flower&&state.step===hit.step)){
    state.flower=null; state.step=null;
    closeInfo(); draw(); return;
  }
  state.flower=hit.flower; state.step=hit.step;
  draw();
  openInfo(FLOWERS.find(f=>f.id===hit.flower),hit.step);
});

function closeInfo(){
  document.getElementById('info-panel').classList.remove('visible');
  document.getElementById('placeholder-info').style.display='flex';
  document.getElementById('hint').textContent='Click any stage in a flower to explore its content';
  document.getElementById('notes-context').textContent='No phase selected';
}

function openInfo(flower,si){
  document.getElementById('placeholder-info').style.display='none';
  const ip=document.getElementById('info-panel');
  ip.classList.add('visible');
  document.getElementById('hint').textContent='';

  // Pin strip
  const strip=document.getElementById('pin-strip');
  const isPinned=pinned.flower===flower.id&&pinned.step===si;
  strip.classList.toggle('visible',isPinned);
  if(isPinned) document.getElementById('pin-strip-text').textContent=
    SN[si]+' — '+flower.label.replace('\n',' ')+' is pinned';

  document.getElementById('panel-title').textContent=flower.label.replace('\n',' ');
  document.getElementById('panel-dot').style.background=SC[si];
  document.getElementById('panel-stage-lbl').textContent=SN[si];

  // Tabs
  const tabs=document.getElementById('stage-tabs');
  tabs.innerHTML='';
  SN.forEach((name,i)=>{
    const b=document.createElement('button');
    b.className='stage-tab'+(i===si?' active':'');
    b.textContent=name;
    if(i===si) b.style.background=SC[i];
    b.onclick=()=>{state.step=i;draw();openInfo(flower,i);};
    tabs.appendChild(b);
  });

  // Info textarea
  const ta=document.getElementById('info-textarea');
  ta.value=phaseContent[flower.id][si];
  ta.style.borderColor=SC[si]+'99';
  ta.oninput=()=>document.getElementById('save-confirm').classList.remove('show');

  // Save
  document.getElementById('save-btn').onclick=()=>{
    phaseContent[flower.id][si]=ta.value;
    const sc=document.getElementById('save-confirm');
    sc.classList.add('show');
    setTimeout(()=>sc.classList.remove('show'),2200);
  };

  // Pin button
  const pinBtn=document.getElementById('pin-btn');
  const alreadyPinned=pinned.flower===flower.id&&pinned.step===si;
  pinBtn.classList.toggle('pinned',alreadyPinned);
  pinBtn.textContent=alreadyPinned?'Unpin this phase':'Choose this phase';
  pinBtn.onclick=()=>{
    if(pinned.flower===flower.id&&pinned.step===si){
      pinned.flower=null; pinned.step=null;
    } else {
      pinned.flower=flower.id; pinned.step=si;
    }
    draw();
    openInfo(flower,si);
  };

  // Notes
  const nc=document.getElementById('notes-context');
  nc.textContent=flower.label.replace('\n',' ')+' — '+SN[si];
  const nta=document.getElementById('notes-textarea');
  nta.value=phaseNotes[flower.id][si];
  nta.oninput=()=>document.getElementById('notes-confirm').classList.remove('show');

  document.getElementById('notes-save-btn').onclick=()=>{
    phaseNotes[flower.id][si]=nta.value;
    const nc2=document.getElementById('notes-confirm');
    nc2.classList.add('show');
    setTimeout(()=>nc2.classList.remove('show'),2200);
  };
}

draw();
</script>
</body>
</html>
