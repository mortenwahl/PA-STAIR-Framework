<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PA-STAIR Framework</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f4f2ed;
    color: #1a1a1a;
    min-height: 100vh;
  }

  header {
    padding: 2rem 3rem 1.25rem;
    background: #f4f2ed;
  }

  header h1 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #888;
  }

  header h2 {
    font-size: 26px;
    font-weight: 800;
    color: #2a3a1a;
    margin-top: 4px;
    letter-spacing: 0.01em;
  }

  header .underline {
    width: 120px;
    height: 3px;
    background: #c0392b;
    margin-top: 10px;
    border-radius: 2px;
  }

  main {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1.5rem 2rem 3rem;
    gap: 0;
  }

  .left-col {
    flex: 0 0 220px;
    padding-top: 2rem;
  }

  .legend-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 1.2rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 1.4rem;
  }

  .legend-petal {
    width: 36px;
    height: 54px;
    flex-shrink: 0;
  }

  .legend-label {
    font-size: 14px;
    color: #333;
    font-weight: 500;
    line-height: 1.3;
  }

  .right-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #canvas-wrap {
    position: relative;
    width: 680px;
    height: 680px;
  }

  #c {
    width: 680px;
    height: 680px;
    cursor: pointer;
    display: block;
  }

  #hint {
    font-size: 13px;
    color: #aaa;
    text-align: center;
    margin-top: 4px;
    min-height: 20px;
    font-style: italic;
  }

  #panel {
    width: 100%;
    max-width: 660px;
    margin-top: 1rem;
  }

  #panel-box {
    background: #fff;
    border: 1px solid #e5e2db;
    border-radius: 14px;
    overflow: hidden;
    display: none;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }

  .panel-top {
    padding: 1.25rem 1.5rem 0.5rem;
  }

  .stage-tabs {
    display: flex;
    gap: 7px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .stage-tab {
    font-size: 12px;
    padding: 5px 16px;
    border-radius: 20px;
    border: 1px solid #ddd;
    cursor: pointer;
    color: #777;
    background: transparent;
    font-family: inherit;
    transition: all 0.15s;
  }

  .stage-tab:hover { background: #f5f5f5; }
  .stage-tab.active { color: #fff; border-color: transparent; font-weight: 600; }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-dot {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
  }

  .panel-stage-label {
    font-size: 12px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-top: 4px;
    padding: 0 1.5rem;
  }

  .edit-area-wrap {
    padding: 0.6rem 1.5rem 0.75rem;
  }

  .edit-label {
    font-size: 11px;
    color: #bbb;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    min-height: 100px;
    background: #fafaf8;
    border: 1px solid #e8e5df;
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 14px;
    color: #333;
    font-family: inherit;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: #bbb; background: #fff; }

  .save-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem 1.25rem;
  }

  .save-btn {
    font-size: 13px;
    padding: 6px 20px;
    border-radius: 8px;
    border: 1px solid #ccc;
    cursor: pointer;
    background: transparent;
    color: #333;
    font-family: inherit;
    transition: background 0.15s;
  }

  .save-btn:hover { background: #f0f0f0; }

  .save-confirm {
    font-size: 12px;
    color: #2e7d32;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .save-confirm.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>Framework</h1>
  <h2>Framework — Public Sector Institution</h2>
  <div class="underline"></div>
</header>

<main>
  <div class="left-col">
    <div class="legend-title">Phases</div>

    <div class="legend-item">
      <svg class="legend-petal" viewBox="0 0 36 54">
        <path d="M4,48 L8,10 Q18,0 28,10 L32,48 Q18,54 4,48 Z" fill="#2c4a6e"/>
      </svg>
      <div class="legend-label">Adaptation<br>phase</div>
    </div>

    <div class="legend-item">
      <svg class="legend-petal" viewBox="0 0 36 54">
        <path d="M4,48 L8,10 Q18,0 28,10 L32,48 Q18,54 4,48 Z" fill="#2d7ab5"/>
      </svg>
      <div class="legend-label">Analysis<br>phase</div>
    </div>

    <div class="legend-item">
      <svg class="legend-petal" viewBox="0 0 36 54">
        <path d="M4,48 L8,10 Q18,0 28,10 L32,48 Q18,54 4,48 Z" fill="#8ecae6"/>
      </svg>
      <div class="legend-label">Exploration<br>phase</div>
    </div>
  </div>

  <div class="right-col">
    <div id="canvas-wrap">
      <canvas id="c" width="680" height="680"></canvas>
    </div>
    <div id="hint">Click any stage in a flower to explore its content</div>
    <div id="panel">
      <div id="panel-box">
        <div class="panel-top">
          <div class="stage-tabs" id="stage-tabs"></div>
          <div class="panel-header">
            <div class="panel-dot" id="panel-dot"></div>
            <div class="panel-title" id="panel-title"></div>
          </div>
        </div>
        <div class="panel-stage-label" id="panel-stage-label"></div>
        <div class="edit-area-wrap">
          <div class="edit-label">Content — click to edit</div>
          <textarea id="edit-area" placeholder="Enter content for this stage..."></textarea>
        </div>
        <div class="save-bar">
          <button class="save-btn" id="save-btn">Save changes</button>
          <span class="save-confirm" id="save-confirm">Saved!</span>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const TAU = Math.PI * 2, PI = Math.PI;
const CX = 340, CY = 340;

// Colors matching the reference image exactly
const STAGE_COLORS = ['#8ecae6', '#2d7ab5', '#2c4a6e'];
const STAGE_NAMES  = ['Exploration phase', 'Analysis phase', 'Adaptation phase'];

// Inner ring segments - pink/purple tones
const INNER_SEGS = [
  { label: 'Technology',   color: '#b56fc7', start: -PI*0.45, end:  PI*0.50 },
  { label: 'Organisation', color: '#de7db8', start:  PI*0.50, end:  PI*1.38 },
  { label: 'Human',        color: '#c85aa8', start:  PI*1.38, end:  PI*2.55 },
];

const PINK_R   = 118;  // outer pink ring radius
const CORE_R   = 56;   // dark purple center

// 7 flowers evenly spaced — angles matching reference image layout
const FLOWERS = [
  { id: 'third_party', label: 'Third party\nvendor',       angle: -90  },
  { id: 'governance',  label: 'Governance',                angle: -38  },
  { id: 'reflection',  label: 'Reflection\n(Holm)',        angle:  14  },
  { id: 'sensemaking', label: 'Sensemaking',               angle:  62  },
  { id: 'competence',  label: 'Competence\nalignment',     angle: 114  },
  { id: 'trust',       label: 'Trust &\ntransparency',     angle: 166  },
  { id: 'org_embed',   label: 'Organisational\nembedding', angle: 218  },
];

// Base petal geometry — 3 rings per flower, matching the chunky trapezoid shapes
const BASE_R   = PINK_R + 2;
const RINGS = [
  { ri: BASE_R,      ro: BASE_R + 52,  sp: 0.58 },  // Exploration — innermost, widest
  { ri: BASE_R + 54, ro: BASE_R + 98,  sp: 0.50 },  // Analysis
  { ri: BASE_R + 100,ro: BASE_R + 136, sp: 0.43 },  // Adaptation — outermost
];

// Active state: pressed ring fans out, others compress
function getRings(isFlowerActive, activeStep) {
  if (!isFlowerActive) return RINGS;
  return RINGS.map((r, i) => {
    if (i === activeStep) {
      // Big expansion — this ring opens up wide
      return {
        ri: r.ri - (i === 0 ? 8 : 0),
        ro: r.ro + (i === 0 ? 56 : i === 1 ? 48 : 40),
        sp: r.sp + 0.18,
      };
    }
    // Non-active rings in same flower compress slightly
    return { ri: r.ri, ro: r.ro, sp: r.sp * 0.75 };
  });
}

const content = {};
FLOWERS.forEach(f => {
  content[f.id] = [
    'Click to edit — describe the Exploration phase for ' + f.label.replace('\n', ' ') + '.',
    'Click to edit — describe the Analysis phase for '   + f.label.replace('\n', ' ') + '.',
    'Click to edit — describe the Adaptation phase for ' + f.label.replace('\n', ' ') + '.',
  ];
});

const active = { flower: null, step: null };
const hits   = [];

function toR(d) { return d * PI / 180; }

function drawPetal(ctx, angle, ri, ro, sp, color, alpha) {
  const h  = sp / 2;
  const a1 = angle - h, a2 = angle + h;
  ctx.beginPath();
  ctx.arc(CX, CY, ri, a1, a2);
  const o1x = CX + ro * Math.cos(a2), o1y = CY + ro * Math.sin(a2);
  const o2x = CX + ro * Math.cos(a1), o2y = CY + ro * Math.sin(a1);
  // Rounded cap — the characteristic trapezoid top
  const capD = ro + 22;
  const capX = CX + capD * Math.cos(angle), capY = CY + capD * Math.sin(angle);
  ctx.lineTo(o1x, o1y);
  ctx.quadraticCurveTo(capX, capY, o2x, o2y);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.globalAlpha = alpha;
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function inPetal(px, py, angle, ri, ro, sp) {
  const dx = px - CX, dy = py - CY;
  const d  = Math.sqrt(dx*dx + dy*dy);
  if (d < ri - 6 || d > ro + 26) return false;
  let a = Math.atan2(dy, dx) - angle;
  while (a >  PI) a -= TAU;
  while (a < -PI) a += TAU;
  return Math.abs(a) < sp / 2 + 0.07;
}

function drawRotatedText(ctx, text, x, y, angle, size, weight, color) {
  ctx.save();
  ctx.translate(x, y);
  let rot = angle + PI / 2;
  if (Math.cos(rot + PI / 2) < 0) rot += PI;
  ctx.rotate(rot);
  ctx.font = `${weight} ${size}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const lines = text.split('\n');
  const lh = size * 1.35;
  const startY = -(lines.length - 1) * lh / 2;
  lines.forEach((l, i) => ctx.fillText(l, 0, startY + i * lh));
  ctx.restore();
}

function draw() {
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  ctx.clearRect(0, 0, 680, 680);
  hits.length  = 0;

  FLOWERS.forEach(f => {
    const angle  = toR(f.angle);
    const isAct  = active.flower === f.id;
    const rings  = getRings(isAct, active.step);
    const maxRo  = Math.max(...rings.map(r => r.ro));
    const blobD  = maxRo + 30;

    // Olive label blob at tip
    const bx = CX + blobD * Math.cos(angle);
    const by = CY + blobD * Math.sin(angle);
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(angle + PI / 2);
    ctx.beginPath();
    ctx.ellipse(0, 0, 44, 26, 0, 0, TAU);
    ctx.fillStyle = '#b8b87a';
    ctx.globalAlpha = 0.85;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();

    // Draw each ring — outermost first so inner overlaps correctly
    for (let si = rings.length - 1; si >= 0; si--) {
      const r       = rings[si];
      const isStAct = isAct && active.step === si;
      const alpha   = isStAct ? 1 : isAct ? 0.72 : 0.93;
      drawPetal(ctx, angle, r.ri, r.ro, r.sp, STAGE_COLORS[si], alpha);
      hits.push({ flower: f.id, step: si, angle, ri: r.ri, ro: r.ro, sp: r.sp });
    }

    // Label
    drawRotatedText(ctx, f.label, bx, by, angle, 10, '600', '#363620');
  });

  // Large pink outer ring
  ctx.beginPath();
  ctx.arc(CX, CY, PINK_R, 0, TAU);
  ctx.fillStyle = '#f2a0d0';
  ctx.fill();

  // Inner segments (Technology / Organisation / Human)
  INNER_SEGS.forEach(seg => {
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, PINK_R - 8, seg.start, seg.end);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    const mid = (seg.start + seg.end) / 2;
    const td  = (PINK_R - 8) * 0.63;
    const tx  = CX + td * Math.cos(mid);
    const ty  = CY + td * Math.sin(mid);
    drawRotatedText(ctx, seg.label, tx, ty, mid - PI/2, 11, '600', '#fff');
  });

  // Dark purple center core
  ctx.beginPath();
  ctx.arc(CX, CY, CORE_R, 0, TAU);
  ctx.fillStyle = '#5a1870';
  ctx.fill();

  ctx.font = "700 12px 'Segoe UI', system-ui, sans-serif";
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PA-STAIR', CX, CY - 7);
  ctx.font = "400 10px 'Segoe UI', system-ui, sans-serif";
  ctx.fillText('Framework', CX, CY + 8);
}

// Hit detection — check from innermost outward so inner rings get priority
document.getElementById('c').addEventListener('click', function (e) {
  const rect = this.getBoundingClientRect();
  const sx   = 680 / rect.width, sy = 680 / rect.height;
  const px   = (e.clientX - rect.left) * sx;
  const py   = (e.clientY - rect.top)  * sy;

  // Reverse hits so innermost (drawn last, therefore on top) wins
  let hit = null;
  for (let i = hits.length - 1; i >= 0; i--) {
    const h = hits[i];
    if (inPetal(px, py, h.angle, h.ri, h.ro, h.sp)) { hit = h; break; }
  }

  if (!hit || (active.flower === hit.flower && active.step === hit.step)) {
    active.flower = null;
    active.step   = null;
    closePanel();
    draw();
    return;
  }

  active.flower = hit.flower;
  active.step   = hit.step;
  draw();
  openPanel(FLOWERS.find(f => f.id === hit.flower), hit.step);
});

function closePanel() {
  document.getElementById('panel-box').style.display = 'none';
  document.getElementById('hint').textContent = 'Click any stage in a flower to explore its content';
}

function openPanel(flower, si) {
  const box = document.getElementById('panel-box');
  box.style.display = 'block';
  document.getElementById('hint').textContent = '';
  document.getElementById('panel-title').textContent = flower.label.replace('\n', ' ');
  document.getElementById('panel-dot').style.background = STAGE_COLORS[si];
  document.getElementById('panel-stage-label').textContent = STAGE_NAMES[si];

  // Stage tabs
  const tabs = document.getElementById('stage-tabs');
  tabs.innerHTML = '';
  STAGE_NAMES.forEach((name, i) => {
    const b = document.createElement('button');
    b.className = 'stage-tab' + (i === si ? ' active' : '');
    b.textContent = name;
    if (i === si) b.style.background = STAGE_COLORS[i];
    b.onclick = () => { active.step = i; draw(); openPanel(flower, i); };
    tabs.appendChild(b);
  });

  const ta = document.getElementById('edit-area');
  ta.value = content[flower.id][si];
  ta.style.borderColor = STAGE_COLORS[si] + '99';
  ta.oninput = () => document.getElementById('save-confirm').classList.remove('show');

  document.getElementById('save-btn').onclick = () => {
    content[flower.id][si] = ta.value;
    const sc = document.getElementById('save-confirm');
    sc.classList.add('show');
    setTimeout(() => sc.classList.remove('show'), 2200);
  };
}

draw();
</script>
</body>
</html>
