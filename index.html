<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PA-STAIR Framework</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;background:#f2ede4;font-family:'Barlow',system-ui,sans-serif;}

header{padding:2.2rem 3rem 0;}
header h2{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:#4a5220;letter-spacing:0.12em;text-transform:uppercase;}
.underline{width:180px;height:4px;background:#c0390a;margin-top:10px;border-radius:2px;}

.page-layout{display:grid;grid-template-columns:180px 1fr 300px;gap:0;padding:0.8rem 1.5rem 2rem 2rem;align-items:start;}

.legend{padding-top:2rem;}
.legend-heading{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#aaa;margin-bottom:1.4rem;}
.legend-item{display:flex;align-items:center;gap:14px;margin-bottom:1.6rem;}
.legend-shape{width:38px;height:60px;flex-shrink:0;}
.legend-lbl{font-size:14px;color:#444;font-weight:500;line-height:1.3;}

/* Canvas — no overflow clipping anywhere */
.canvas-area{display:flex;flex-direction:column;align-items:center;padding-top:0.3rem;overflow:visible;}
#c{display:block;cursor:pointer;overflow:visible;}
#hint{font-size:12px;color:#bbb;font-style:italic;text-align:center;margin-top:4px;min-height:18px;}

.right-col{padding-top:1.2rem;display:flex;flex-direction:column;gap:0.8rem;overflow:visible;}

.panel-placeholder{background:rgba(0,0,0,0.03);border:1px dashed #d8d4cc;border-radius:10px;padding:1.6rem 1.2rem;text-align:center;color:#ccc;font-size:13px;font-style:italic;min-height:120px;display:flex;align-items:center;justify-content:center;}

.info-panel{background:#fff;border:1px solid #e8e4dc;border-radius:10px;box-shadow:0 1px 8px rgba(0,0,0,0.05);display:none;}
.info-panel.visible{display:block;}

/* Pinned cards list */
.pinned-list{display:flex;flex-direction:column;gap:7px;}
.pinned-card{background:#fff;border:1px solid #e8e4dc;border-radius:9px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.04);}
.pinned-card-head{display:flex;align-items:center;justify-content:space-between;padding:7px 10px 5px;}
.pinned-card-left{display:flex;align-items:center;gap:7px;}
.pinned-card-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pinned-card-name{font-size:12px;font-weight:600;color:#333;}
.pinned-card-phase{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.06em;}
.pinned-card-unpin{font-size:11px;color:#bbb;cursor:pointer;padding:2px 5px;border-radius:4px;transition:all .15s;border:none;background:none;font-family:inherit;}
.pinned-card-unpin:hover{color:#e05;background:#fee;}
.pinned-card-note{font-size:12px;color:#666;padding:0 10px 8px;line-height:1.55;border-top:1px solid #f4f1eb;padding-top:6px;margin-top:2px;white-space:pre-wrap;word-break:break-word;}
.pinned-card-no-note{font-size:11px;color:#ccc;font-style:italic;padding:0 10px 8px;}

.panel-top{padding:0.85rem 1.1rem 0.3rem;}
.stage-tabs{display:flex;gap:5px;margin-bottom:0.55rem;flex-wrap:wrap;}
.stage-tab{font-size:11px;padding:4px 12px;border-radius:16px;border:1px solid #ddd;cursor:pointer;color:#888;background:transparent;font-family:inherit;transition:all .15s;}
.stage-tab:hover{background:#f5f5f5;}
.stage-tab.active{color:#fff;border-color:transparent;font-weight:600;}

.panel-header{display:flex;align-items:center;gap:8px;}
.panel-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.panel-title{font-size:15px;font-weight:600;color:#1a1a1a;}
.panel-stage-lbl{font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:.08em;padding:0.2rem 1.1rem 0;}

.edit-wrap{padding:0.45rem 1.1rem 0.45rem;}
.edit-lbl{font-size:10px;color:#ccc;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
textarea{width:100%;min-height:75px;background:#fafaf8;border:1px solid #ebe8e2;border-radius:7px;padding:8px 10px;font-size:13px;color:#333;font-family:inherit;line-height:1.65;resize:vertical;outline:none;transition:border-color .15s;}
textarea:focus{border-color:#aaa;background:#fff;}

.panel-footer{display:flex;align-items:center;justify-content:space-between;padding:0 1.1rem 0.85rem;gap:7px;flex-wrap:wrap;}
.btn{font-size:12px;padding:5px 14px;border-radius:7px;border:1px solid #ccc;cursor:pointer;background:transparent;color:#333;font-family:inherit;transition:all .15s;white-space:nowrap;}
.btn:hover{background:#f0f0f0;}
.btn-pin{border-color:#3a7ab5;color:#3a7ab5;font-weight:600;}
.btn-pin:hover{background:#eef4fb;}
.btn-pin.pinned{background:#3a7ab5;color:#fff;}
.btn-pin.pinned:hover{background:#1f5f8a;}
.save-confirm{font-size:11px;color:#2e7d32;opacity:0;transition:opacity .3s;}
.save-confirm.show{opacity:1;}

.notes-box{background:#fff;border:1px solid #e8e4dc;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,0.04);}
.notes-head{padding:0.7rem 1.1rem 0.3rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f4f1eb;}
.notes-title{font-size:13px;font-weight:600;color:#666;}
.notes-ctx{font-size:11px;color:#ccc;font-style:italic;}
.notes-body{padding:0.4rem 1.1rem 0.55rem;}
.notes-body textarea{min-height:60px;}
.notes-foot{padding:0 1.1rem 0.7rem;display:flex;justify-content:flex-end;align-items:center;gap:8px;}
</style>
</head>
<body>
<header>
  <h2>Framework - Public Sector Institution</h2>
  <div class="underline"></div>
</header>
<div class="page-layout">

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-heading">Phases</div>
    <div class="legend-item">
      <svg class="legend-shape" viewBox="0 0 38 60"><path d="M5,55 Q4,30 19,4 Q34,30 33,55 Q19,62 5,55Z" fill="#3d5068"/></svg>
      <div class="legend-lbl">Adaptation<br>phase</div>
    </div>
    <div class="legend-item">
      <svg class="legend-shape" viewBox="0 0 38 60"><path d="M5,55 Q4,30 19,4 Q34,30 33,55 Q19,62 5,55Z" fill="#3278b0"/></svg>
      <div class="legend-lbl">Analysis<br>phase</div>
    </div>
    <div class="legend-item">
      <svg class="legend-shape" viewBox="0 0 38 60"><path d="M5,55 Q4,30 19,4 Q34,30 33,55 Q19,62 5,55Z" fill="#7bbdd8"/></svg>
      <div class="legend-lbl">Exploration<br>phase</div>
    </div>
  </div>

  <!-- CANVAS — large enough so fully expanded petals never clip -->
  <div class="canvas-area">
    <canvas id="c" width="860" height="860"></canvas>
    <div id="hint">Click any petal stage to explore its content</div>
  </div>

  <!-- RIGHT PANELS -->
  <div class="right-col">
    <div class="panel-placeholder" id="ph">Click a petal stage to see its information here</div>

    <div class="info-panel" id="info-panel">
      <div class="panel-top">
        <div class="stage-tabs" id="stage-tabs"></div>
        <div class="panel-header">
          <div class="panel-dot" id="panel-dot"></div>
          <div class="panel-title" id="panel-title"></div>
        </div>
      </div>
      <div class="panel-stage-lbl" id="panel-stage-lbl"></div>
      <div class="edit-wrap">
        <div class="edit-lbl">Content — click to edit</div>
        <textarea id="info-ta" placeholder="Describe this phase…"></textarea>
      </div>
      <div class="panel-footer">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <button class="btn btn-pin" id="pin-btn">Choose this phase</button>
          <button class="btn" id="save-btn">Save</button>
        </div>
        <span class="save-confirm" id="save-confirm">Saved!</span>
      </div>
    </div>

    <div class="notes-box">
      <div class="notes-head">
        <div class="notes-title">My notes</div>
        <div class="notes-ctx" id="notes-ctx">No phase selected</div>
      </div>
      <div class="notes-body">
        <textarea id="notes-ta" placeholder="Write your own notes here…"></textarea>
      </div>
      <div class="notes-foot">
        <button class="btn" id="notes-save">Save note</button>
        <span class="save-confirm" id="notes-confirm">Saved!</span>
      </div>
    </div>

    <!-- Pinned cards — shown below notes -->
    <div id="pinned-list" class="pinned-list"></div>
  </div>
</div>

<script>
const TAU=Math.PI*2,PI=Math.PI;

// Canvas is 860×860, center at 430,430
// Max expanded petal: BR + 190 + 80(expansion) + 34(blob) + 50(blob radius) = ~130+3+190+80+34+50 = ~487 from center
// 430 + 487 = 917 — too much. Scale down base rings so max reach fits within 430-30=400px from center.
// With BR=108+3=111: 111+140+80+34+50 = 415 — fits with ~15px margin on 430 center. Good.

const CX=430,CY=430;
const CORE_R=44,PINK_R=108,BR=PINK_R+3;

// Petal rings — sized so even fully expanded they stay within canvas
const BASE=[
  {ri:BR,      ro:BR+65,  sp:0.66},  // Exploration
  {ri:BR+68,   ro:BR+118, sp:0.57},  // Analysis
  {ri:BR+121,  ro:BR+160, sp:0.49},  // Adaptation
];

// Max normal reach: BR+160+30(cap)+34(blobDist)+50(blobRadius) = 111+160+30+34+50 = 385 < 430 ✓
// Max expanded reach (outer ring): BR+160+50(expansion)+30+34+50 = 111+210+30+34+50 = 435 → canvas edge 430. Trim expansion:
// Use +44 for outer expansion so max = 111+204+30+34+50 = 429 < 430 ✓

const SC=['#7bbdd8','#3278b0','#3d5068'];
const SN=['Exploration phase','Analysis phase','Adaptation phase'];

function toR(d){return d*PI/180;}
const STEP=360/7;

const FLOWERS=[
  {id:'third_party', label:'Third party\nvendor',       angle:-90,        flip:false},
  {id:'governance',  label:'Governance',                angle:-90+STEP,   flip:false},
  {id:'reflection',  label:'Reflection\n(Holm)',        angle:-90+STEP*2, flip:false},
  {id:'sensemaking', label:'Sensemaking',               angle:-90+STEP*3, flip:false},
  {id:'competence',  label:'Competence\nalignment',     angle:-90+STEP*4, flip:true},
  {id:'org_embed',   label:'Organisational\nembedding', angle:-90+STEP*5, flip:true},
  {id:'trust',       label:'Trust &\ntransparency',     angle:-90+STEP*6, flip:false},
];

const fa=FLOWERS.map(f=>toR(f.angle));
function midA(a,b){return (a+b)/2;}
const B_TH=midA(fa[6],fa[0]+TAU)-TAU;
const B_GO=midA(fa[1],fa[2]);
const B_CO=midA(fa[4],fa[5]);

const INNER=[
  {label:'Technology',   color:'#b068c8', start:B_TH, end:B_GO},
  {label:'Organisation', color:'#d87ab0', start:B_GO, end:B_CO},
  {label:'Human',        color:'#c058a0', start:B_CO, end:B_TH+TAU},
];

// Content stores
const phaseContent={}, phaseNotes={};
FLOWERS.forEach(f=>{
  phaseContent[f.id]=[
    'Describe the Exploration phase for '+f.label.replace('\n',' ')+' here.',
    'Describe the Analysis phase for '+f.label.replace('\n',' ')+' here.',
    'Describe the Adaptation phase for '+f.label.replace('\n',' ')+' here.',
  ];
  phaseNotes[f.id]=['','',''];
});

// pinnedMap stores: { flowerId: { step: int, note: string } }
const pinnedMap={};
const cur={flower:null,step:null};
const hits=[];

function getRings(isActive,activeStep){
  if(!isActive) return BASE;
  return BASE.map((r,i)=>{
    if(i===activeStep){
      // Carefully capped expansions so petals stay within canvas
      const expand=i===0?70:i===1?58:44;
      return{ri:r.ri-(i===0?10:0), ro:r.ro+expand, sp:r.sp+0.20};
    }
    return{ri:r.ri, ro:r.ro, sp:r.sp*0.72};
  });
}

function drawPetal(ctx,angle,ri,ro,sp,color,alpha,sw){
  const h=sp/2,a1=angle-h,a2=angle+h;
  ctx.beginPath();
  ctx.arc(CX,CY,ri,a1,a2);
  const o1x=CX+ro*Math.cos(a2),o1y=CY+ro*Math.sin(a2);
  const o2x=CX+ro*Math.cos(a1),o2y=CY+ro*Math.sin(a1);
  const capX=CX+(ro+26)*Math.cos(angle),capY=CY+(ro+26)*Math.sin(angle);
  ctx.lineTo(o1x,o1y);
  ctx.quadraticCurveTo(capX,capY,o2x,o2y);
  ctx.closePath();
  ctx.fillStyle=color;ctx.globalAlpha=alpha;ctx.fill();ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(255,255,255,0.58)';ctx.lineWidth=sw||1.6;ctx.stroke();
}

function inPetal(px,py,angle,ri,ro,sp){
  const dx=px-CX,dy=py-CY,d=Math.sqrt(dx*dx+dy*dy);
  if(d<ri-8||d>ro+30) return false;
  let a=Math.atan2(dy,dx)-angle;
  while(a>PI)a-=TAU; while(a<-PI)a+=TAU;
  return Math.abs(a)<sp/2+0.08;
}

function rotText(ctx,text,x,y,angle,size,weight,color,forceFlip){
  ctx.save();ctx.translate(x,y);
  let rot=angle+PI/2;
  if(forceFlip){rot+=PI;}else if(Math.cos(rot+PI/2)<0){rot+=PI;}
  ctx.rotate(rot);
  ctx.font=`${weight} ${size}px 'Barlow',system-ui,sans-serif`;
  ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';
  const lines=text.split('\n'),lh=size*1.3,oy=-(lines.length-1)*lh/2;
  lines.forEach((l,i)=>ctx.fillText(l,0,oy+i*lh));
  ctx.restore();
}

function draw(){
  const canvas=document.getElementById('c');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,860,860);
  hits.length=0;

  FLOWERS.forEach(f=>{
    const angle=toR(f.angle);
    const isAct=cur.flower===f.id;
    const isPinned=pinnedMap.hasOwnProperty(f.id);
    const showExp=isAct||(isPinned&&!isAct);
    const expStep=isAct?cur.step:pinnedMap[f.id]?.step;
    const rings=getRings(showExp,expStep);
    const maxRo=Math.max(...rings.map(r=>r.ro));
    const blobD=maxRo+30;
    const bx=CX+blobD*Math.cos(angle),by=CY+blobD*Math.sin(angle);

    // Olive blob
    ctx.save();ctx.translate(bx,by);ctx.rotate(angle+PI/2);
    ctx.beginPath();ctx.ellipse(0,0,48,26,0,0,TAU);
    ctx.fillStyle='#b0ae72';ctx.globalAlpha=0.82;ctx.fill();ctx.globalAlpha=1;
    ctx.restore();

    for(let si=rings.length-1;si>=0;si--){
      const r=rings[si];
      const isStAct=(isAct&&cur.step===si)||(isPinned&&!isAct&&pinnedMap[f.id]?.step===si);
      const alpha=isStAct?1:showExp?0.65:0.92;
      drawPetal(ctx,angle,r.ri,r.ro,r.sp,SC[si],alpha,isStAct?2.4:1.5);
      hits.push({flower:f.id,step:si,angle,ri:r.ri,ro:r.ro,sp:r.sp});
    }

    // Pinned glow — only visual, no geometry change
    if(isPinned&&!isAct){
      const ps=pinnedMap[f.id].step;
      const pr=getRings(true,ps)[ps];
      const h=pr.sp/2,a1=angle-h,a2=angle+h;
      ctx.beginPath();
      ctx.arc(CX,CY,pr.ri,a1,a2);
      const o1x=CX+pr.ro*Math.cos(a2),o1y=CY+pr.ro*Math.sin(a2);
      const o2x=CX+pr.ro*Math.cos(a1),o2y=CY+pr.ro*Math.sin(a1);
      const capX=CX+(pr.ro+26)*Math.cos(angle),capY=CY+(pr.ro+26)*Math.sin(angle);
      ctx.lineTo(o1x,o1y);ctx.quadraticCurveTo(capX,capY,o2x,o2y);ctx.closePath();
      ctx.strokeStyle=SC[ps];ctx.lineWidth=3.5;ctx.globalAlpha=0.5;ctx.stroke();ctx.globalAlpha=1;
    }

    rotText(ctx,f.label,bx,by,angle,10,'500','#3a3820',f.flip);
  });

  // Pink ring
  ctx.beginPath();ctx.arc(CX,CY,PINK_R,0,TAU);ctx.fillStyle='#efa8cc';ctx.fill();

  // Inner segments
  INNER.forEach(seg=>{
    ctx.beginPath();ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,PINK_R-8,seg.start,seg.end);
    ctx.closePath();ctx.fillStyle=seg.color;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.4;ctx.stroke();
    const mid=(seg.start+seg.end)/2,td=(PINK_R-8)*0.62;
    rotText(ctx,seg.label,CX+td*Math.cos(mid),CY+td*Math.sin(mid),mid-PI/2,11.5,'600','#fff',false);
  });

  // Core
  ctx.beginPath();ctx.arc(CX,CY,CORE_R,0,TAU);ctx.fillStyle='#561872';ctx.fill();
  ctx.font="700 11px 'Barlow',system-ui,sans-serif";
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('PA-STAIR',CX,CY-6);
  ctx.font="400 9px 'Barlow',system-ui,sans-serif";
  ctx.fillText('Framework',CX,CY+7);
}

// ── CLICK ──
document.getElementById('c').addEventListener('click',function(e){
  const rect=this.getBoundingClientRect();
  const sx=860/rect.width,sy=860/rect.height;
  const px=(e.clientX-rect.left)*sx,py=(e.clientY-rect.top)*sy;
  let hit=null;
  for(let i=hits.length-1;i>=0;i--){
    const h=hits[i];
    if(inPetal(px,py,h.angle,h.ri,h.ro,h.sp)){hit=h;break;}
  }
  if(!hit||(cur.flower===hit.flower&&cur.step===hit.step)){
    cur.flower=null;cur.step=null;closePanel();draw();return;
  }
  cur.flower=hit.flower;cur.step=hit.step;
  draw();
  openPanel(FLOWERS.find(f=>f.id===hit.flower),hit.step);
});

function closePanel(){
  document.getElementById('info-panel').classList.remove('visible');
  document.getElementById('ph').style.display='flex';
  document.getElementById('hint').textContent='Click any petal stage to explore its content';
  document.getElementById('notes-ctx').textContent='No phase selected';
}

function openPanel(flower,si){
  document.getElementById('ph').style.display='none';
  document.getElementById('info-panel').classList.add('visible');
  document.getElementById('hint').textContent='';
  document.getElementById('panel-title').textContent=flower.label.replace('\n',' ');
  document.getElementById('panel-dot').style.background=SC[si];
  document.getElementById('panel-stage-lbl').textContent=SN[si];

  const tabs=document.getElementById('stage-tabs');tabs.innerHTML='';
  SN.forEach((name,i)=>{
    const b=document.createElement('button');
    b.className='stage-tab'+(i===si?' active':'');b.textContent=name;
    if(i===si)b.style.background=SC[i];
    b.onclick=()=>{cur.step=i;draw();openPanel(flower,i);};
    tabs.appendChild(b);
  });

  const ta=document.getElementById('info-ta');
  ta.value=phaseContent[flower.id][si];
  ta.style.borderColor=SC[si]+'99';
  ta.oninput=()=>document.getElementById('save-confirm').classList.remove('show');
  document.getElementById('save-btn').onclick=()=>{
    phaseContent[flower.id][si]=ta.value;
    // If this phase is pinned, update pinned note display too
    if(pinnedMap[flower.id]?.step===si){
      pinnedMap[flower.id].note=phaseNotes[flower.id][si];
      renderPinnedCards();
    }
    const sc=document.getElementById('save-confirm');
    sc.classList.add('show');setTimeout(()=>sc.classList.remove('show'),2200);
  };

  // Pin button
  const pinBtn=document.getElementById('pin-btn');
  const isPinned=pinnedMap[flower.id]?.step===si;
  pinBtn.classList.toggle('pinned',isPinned);
  pinBtn.textContent=isPinned?'Unpin this phase':'Choose this phase';
  pinBtn.onclick=()=>{
    if(pinnedMap[flower.id]?.step===si){
      delete pinnedMap[flower.id];
    } else {
      // Store step + current note for this phase
      pinnedMap[flower.id]={
        step: si,
        note: phaseNotes[flower.id][si]
      };
    }
    renderPinnedCards();
    draw();
    openPanel(flower,si);
  };

  // Notes — load current note for this flower+phase
  document.getElementById('notes-ctx').textContent=flower.label.replace('\n',' ')+' — '+SN[si];
  const nta=document.getElementById('notes-ta');
  nta.value=phaseNotes[flower.id][si];
  nta.oninput=()=>document.getElementById('notes-confirm').classList.remove('show');
  document.getElementById('notes-save').onclick=()=>{
    phaseNotes[flower.id][si]=nta.value;
    // Live-update pinned card note if this phase is pinned
    if(pinnedMap[flower.id]?.step===si){
      pinnedMap[flower.id].note=nta.value;
      renderPinnedCards();
    }
    const nc=document.getElementById('notes-confirm');
    nc.classList.add('show');setTimeout(()=>nc.classList.remove('show'),2200);
  };
}

function renderPinnedCards(){
  const container=document.getElementById('pinned-list');
  container.innerHTML='';
  const keys=Object.keys(pinnedMap);
  if(keys.length===0){container.style.display='none';return;}
  container.style.display='flex';

  // Section heading
  const heading=document.createElement('div');
  heading.style.cssText='font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#aaa;margin-bottom:2px;padding:0 2px;';
  heading.textContent='Chosen phases';
  container.appendChild(heading);

  keys.forEach(fid=>{
    const pinData=pinnedMap[fid];
    const si=pinData.step;
    const note=pinData.note||'';
    const flower=FLOWERS.find(f=>f.id===fid);

    const card=document.createElement('div');
    card.className='pinned-card';
    card.style.borderLeft=`3px solid ${SC[si]}`;

    const head=document.createElement('div');
    head.className='pinned-card-head';

    const left=document.createElement('div');
    left.className='pinned-card-left';

    const dot=document.createElement('div');
    dot.className='pinned-card-dot';
    dot.style.background=SC[si];

    const nameWrap=document.createElement('div');
    const nameEl=document.createElement('div');
    nameEl.className='pinned-card-name';
    nameEl.textContent=flower.label.replace('\n',' ');
    const phaseEl=document.createElement('div');
    phaseEl.className='pinned-card-phase';
    phaseEl.textContent=SN[si];
    nameWrap.appendChild(nameEl);
    nameWrap.appendChild(phaseEl);

    left.appendChild(dot);
    left.appendChild(nameWrap);

    const unpinBtn=document.createElement('button');
    unpinBtn.className='pinned-card-unpin';
    unpinBtn.textContent='Unpin';
    unpinBtn.onclick=()=>{
      delete pinnedMap[fid];
      renderPinnedCards();
      draw();
      if(cur.flower===fid) openPanel(flower,cur.step);
    };

    head.appendChild(left);
    head.appendChild(unpinBtn);
    card.appendChild(head);

    // Note content
    if(note.trim()){
      const noteEl=document.createElement('div');
      noteEl.className='pinned-card-note';
      noteEl.textContent=note;
      card.appendChild(noteEl);
    } else {
      const noNote=document.createElement('div');
      noNote.className='pinned-card-no-note';
      noNote.textContent='No notes written yet';
      card.appendChild(noNote);
    }

    container.appendChild(card);
  });
}

draw();
</script>
</body>
</html>
